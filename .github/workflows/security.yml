name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday at 07:00 UTC
    - cron: "0 7 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  # ── tfsec: static analysis for misconfigurations ──────────────────────────
  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: true

  # ── Trivy: misconfiguration scanner with SARIF upload ─────────────────────
  trivy:
    name: Trivy config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy.sarif
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
          category: trivy-config
