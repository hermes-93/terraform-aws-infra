name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Fake credentials so terraform validate/init work without real AWS access
  AWS_ACCESS_KEY_ID: fake
  AWS_SECRET_ACCESS_KEY: fake
  AWS_DEFAULT_REGION: us-east-1
  TF_IN_AUTOMATION: "true"

jobs:
  # ── Format check ──────────────────────────────────────────────────────────
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.x"

      - name: Check formatting (all dirs)
        run: terraform fmt -check -recursive

  # ── Validate ──────────────────────────────────────────────────────────────
  validate:
    name: terraform validate (${{ matrix.env }})
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.x"

      - name: Init (no backend)
        working-directory: envs/${{ matrix.env }}
        run: terraform init -backend=false

      - name: Validate
        working-directory: envs/${{ matrix.env }}
        run: terraform validate

  # ── Lint ──────────────────────────────────────────────────────────────────
  tflint:
    name: tflint
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.55.0

      - name: Init tflint
        run: tflint --init

      - name: Run tflint (modules)
        run: |
          for dir in modules/vpc modules/alb modules/ecs; do
            echo "Linting $dir..."
            tflint --chdir "$dir"
          done

      - name: Run tflint (envs)
        run: |
          for dir in envs/dev envs/prod; do
            echo "Linting $dir..."
            tflint --chdir "$dir"
          done

  # ── Security scan ─────────────────────────────────────────────────────────
  checkov:
    name: Checkov security scan
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          # Skip checks not applicable to a demo without HTTPS/KMS/WAF/flow-logs
          skip_check: >-
            CKV_AWS_2,CKV_AWS_65,CKV_AWS_91,CKV_AWS_92,CKV_AWS_103,CKV_AWS_116,
            CKV_AWS_130,CKV_AWS_131,CKV_AWS_150,CKV_AWS_158,CKV_AWS_260,
            CKV_AWS_338,CKV_AWS_378,CKV_AWS_382,CKV2_AWS_5,CKV2_AWS_11,
            CKV2_AWS_19,CKV2_AWS_20,CKV2_AWS_28,CKV2_AWS_35,CKV2_AWS_44,
            CKV2_AWS_74,CKV2_AWS_76
          soft_fail: false

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov-terraform
